<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arduino Quest: Tebak Gambar & Logika</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Poppins:wght@400;600;800&display=swap');
        
        :root {
            --primary: #4f46e5;
            --secondary: #10b981;
            --accent: #f59e0b;
            --bg: #0f172a;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            color: white;
            overflow-x: hidden;
        }

        .pixel-font { font-family: 'Press Start 2P', cursive; }
        
        .card-glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }

        .btn-retro {
            transition: all 0.2s;
            box-shadow: 0 4px 0 #3730a3;
        }
        .btn-retro:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #3730a3;
        }

        .xp-bar {
            height: 12px;
            background: #334155;
            border-radius: 6px;
            overflow: hidden;
        }
        .xp-progress {
            height: 100%;
            background: linear-gradient(90deg, #4f46e5, #818cf8);
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .mission-node {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .float-anim { animation: float 3s ease-in-out infinite; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="game-container" class="w-full max-w-4xl min-h-[600px] card-glass p-8 relative overflow-hidden">
        
        <!-- Screen 1: Welcome -->
        <div id="screen-welcome" class="text-center space-y-8 py-12">
            <div class="float-anim">
                <i class="fas fa-microchip text-7xl text-indigo-500 mb-4"></i>
            </div>
            <h1 class="text-4xl md:text-6xl font-extrabold tracking-tight">
                ARDUINO <span class="text-indigo-400">QUEST</span>
            </h1>
            <p class="text-slate-400 text-lg max-w-md mx-auto">
                Selamat Datang, Calon Engineer! Siap menguji logika pemrograman dan pengetahuan komponen Arduino-mu?
            </p>
            <button onclick="nextScreen('screen-name')" class="btn-retro bg-indigo-600 hover:bg-indigo-500 px-10 py-4 rounded-xl font-bold text-xl">
                MULAI PETUALANGAN
            </button>
        </div>

        <!-- Screen 2: Input Name -->
        <div id="screen-name" class="hidden text-center space-y-8 py-12">
            <h2 class="text-3xl font-bold">Siapa namamu, Pilot?</h2>
            <div class="max-w-xs mx-auto space-y-4">
                <input type="text" id="player-name" placeholder="Masukkan nama..." 
                    class="w-full px-6 py-4 bg-slate-800 border-2 border-indigo-500/30 rounded-xl focus:border-indigo-500 outline-none text-center text-xl">
                <button onclick="saveName()" class="w-full btn-retro bg-emerald-600 hover:bg-emerald-500 px-10 py-4 rounded-xl font-bold text-xl">
                    KONFIRMASI
                </button>
            </div>
        </div>

        <!-- Screen 3: Map / Mission Select -->
        <div id="screen-map" class="hidden space-y-6">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h3 class="text-slate-400 text-sm">PLAYER</h3>
                    <p id="display-name" class="font-bold text-xl text-indigo-400"></p>
                </div>
                <div class="text-right">
                    <h3 class="text-slate-400 text-sm">TOTAL XP</h3>
                    <p id="display-xp" class="font-bold text-xl text-yellow-500">0</p>
                </div>
            </div>

            <h2 class="text-2xl font-bold mb-4">Pilih Misi</h2>
            <div id="mission-grid" class="grid grid-cols-2 md:grid-cols-5 gap-6">
                <!-- Mission buttons generated by JS -->
            </div>
        </div>

        <!-- Screen 4: Quiz Area -->
        <div id="screen-quiz" class="hidden space-y-6">
            <div class="flex justify-between items-center">
                <button onclick="backToMap()" class="text-slate-400 hover:text-white transition">
                    <i class="fas fa-arrow-left mr-2"></i> Peta Misi
                </button>
                <div class="flex items-center gap-4">
                    <span id="quiz-progress" class="text-sm font-bold text-slate-400">KUIS 1/5</span>
                    <div class="w-32 xp-bar">
                        <div id="mission-xp-progress" class="xp-progress" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <div class="bg-slate-800/50 p-6 rounded-2xl border border-slate-700 min-h-[300px] flex flex-col items-center justify-center">
                <div id="quiz-image" class="mb-6 rounded-xl overflow-hidden shadow-2xl max-h-48"></div>
                <p id="quiz-question" class="text-xl text-center font-semibold mb-8"></p>
                
                <div id="quiz-options" class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full">
                    <!-- Options generated by JS -->
                </div>
            </div>
        </div>

        <!-- Overlay for correct/wrong -->
        <div id="feedback-overlay" class="hidden absolute inset-0 z-50 flex items-center justify-center bg-bg/90 backdrop-blur-sm">
            <div class="text-center p-8 space-y-4">
                <div id="feedback-icon" class="text-8xl"></div>
                <h2 id="feedback-title" class="text-3xl font-bold"></h2>
                <p id="feedback-xp" class="text-yellow-500 font-bold text-xl"></p>
                <button id="feedback-btn" class="btn-retro bg-indigo-600 px-8 py-3 rounded-xl font-bold">LANJUT</button>
            </div>
        </div>

    </div>

    <script>
        // Game State
        let player = {
            name: "",
            xp: 0,
            unlockedMissions: 1,
            currentMission: 0,
            currentQuizIdx: 0,
            missionScore: 0
        };

        const missions = [
            { id: 1, title: "Dasar IR", icon: "📡" },
            { id: 2, title: "Komponen LCD", icon: "📺" },
            { id: 3, title: "Alur Sinyal", icon: "⚡" },
            { id: 4, title: "Pin Arduino", icon: "🔌" },
            { id: 5, title: "Logika Kedip", icon: "💡" },
            { id: 6, title: "Addressing I2C", icon: "🔢" },
            { id: 7, title: "Data MotoGP", icon: "🏍️" },
            { id: 8, title: "Navigasi List", icon: "↕️" },
            { id: 9, title: "Command HEX", icon: "0x" },
            { id: 10, title: "Final Boss", icon: "🏆" }
        ];

        // Quiz Database (5 for each 10 missions = 50 total)
        // Simplified for this demo
        const quizData = [
            // Mission 1: Dasar IR
            [
                { q: "Sinyal apa yang digunakan remote TV untuk berkomunikasi?", img: "📡", options: ["Ultra Violet", "Infrared", "Radio", "Microwave"], correct: 1 },
                { q: "Apa fungsi IR Receiver pada Arduino?", img: "📥", options: ["Mengirim Sinar", "Menerima Sinar", "Menyimpan Data", "Memperkuat Listrik"], correct: 1 },
                { q: "Manakah yang merupakan contoh penggunaan IR?", img: "📱", options: ["Keyboard Kabel", "Remote AC", "Mouse USB", "Speaker Bluetooth"], correct: 1 },
                { q: "IR kepanjangan dari...", img: "🔍", options: ["Internal Radio", "Infra Red", "Ion Ray", "Instant Remote"], correct: 1 },
                { q: "Remote IR mengirim perintah dalam bentuk apa?", img: "💡", options: ["Suara", "Cahaya Inframerah", "Gelombang Air", "Tekanan"], correct: 1 }
            ],
            // Mission 2: Komponen LCD
            [
                { q: "Berapa baris teks yang ada di LCD 16x2?", img: "📺", options: ["1", "2", "4", "16"], correct: 1 },
                { q: "Apa kepanjangan dari I2C?", img: "🔗", options: ["Inter-Integrated Circuit", "Internal Interaction", "Input Interface", "Ion Circuit"], correct: 0 },
                { q: "Mengapa I2C lebih disukai daripada LCD biasa?", img: "⚡", options: ["Lebih Murah", "Hemat Kabel", "Lebih Terang", "Lebih Berat"], correct: 1 },
                { q: "Berapa jumlah pin data (SDA/SCL) pada I2C?", img: "📍", options: ["1", "2", "4", "8"], correct: 1 },
                { q: "Fungsi backlight() pada LCD adalah...", img: "✨", options: ["Mematikan LCD", "Menyalakan Lampu Latar", "Menghapus Teks", "Menggeser Teks"], correct: 1 }
            ]
            // Add more missions as needed... 
        ];

        // Fill remaining missions with dummy data for demo purposes
        for (let i = 2; i < 10; i++) {
            quizData[i] = [
                { q: `Pertanyaan Misi ${i+1} - 1`, img: missions[i].icon, options: ["Benar", "Salah", "Mungkin", "Bisa Jadi"], correct: 0 },
                { q: `Pertanyaan Misi ${i+1} - 2`, img: missions[i].icon, options: ["Opsi A", "Opsi B", "Opsi C", "Opsi D"], correct: 1 },
                { q: `Pertanyaan Misi ${i+1} - 3`, img: missions[i].icon, options: ["Opsi A", "Opsi B", "Opsi C", "Opsi D"], correct: 2 },
                { q: `Pertanyaan Misi ${i+1} - 4`, img: missions[i].icon, options: ["Opsi A", "Opsi B", "Opsi C", "Opsi D"], correct: 3 },
                { q: `Pertanyaan Misi ${i+1} - 5`, img: missions[i].icon, options: ["Opsi A", "Opsi B", "Opsi C", "Opsi D"], correct: 0 }
            ];
        }

        function nextScreen(screenId) {
            document.querySelectorAll('#game-container > div').forEach(div => div.classList.add('hidden'));
            document.getElementById(screenId).classList.remove('hidden');
        }

        function saveName() {
            const name = document.getElementById('player-name').value;
            if (name.trim() === "") return alert("Masukkan nama dulu!");
            player.name = name;
            document.getElementById('display-name').innerText = name;
            renderMap();
            nextScreen('screen-map');
        }

        function renderMap() {
            const grid = document.getElementById('mission-grid');
            grid.innerHTML = '';
            missions.forEach((m, idx) => {
                const isLocked = idx >= player.unlockedMissions;
                const node = document.createElement('div');
                node.className = `flex flex-col items-center gap-2 ${isLocked ? 'opacity-50 grayscale' : 'cursor-pointer hover:scale-105'}`;
                node.onclick = isLocked ? null : () => startMission(idx);
                
                node.innerHTML = `
                    <div class="mission-node ${isLocked ? 'bg-slate-700' : 'bg-indigo-600 shadow-lg shadow-indigo-500/20'} text-2xl">
                        ${isLocked ? '<i class="fas fa-lock text-sm"></i>' : m.icon}
                    </div>
                    <span class="text-xs font-bold">${m.title}</span>
                `;
                grid.appendChild(node);
            });
            document.getElementById('display-xp').innerText = player.xp;
        }

        function startMission(idx) {
            player.currentMission = idx;
            player.currentQuizIdx = 0;
            player.missionScore = 0;
            updateQuiz();
            nextScreen('screen-quiz');
        }

        function updateQuiz() {
            const quiz = quizData[player.currentMission][player.currentQuizIdx];
            document.getElementById('quiz-progress').innerText = `KUIS ${player.currentQuizIdx + 1}/5`;
            document.getElementById('mission-xp-progress').style.width = `${(player.currentQuizIdx / 5) * 100}%`;
            document.getElementById('quiz-image').innerHTML = `<span class="text-8xl">${quiz.img}</span>`;
            document.getElementById('quiz-question').innerText = quiz.q;
            
            const optionsContainer = document.getElementById('quiz-options');
            optionsContainer.innerHTML = '';
            quiz.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-4 bg-slate-700 hover:bg-slate-600 rounded-xl transition border border-slate-600 font-medium";
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(idx);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(idx) {
            const quiz = quizData[player.currentMission][player.currentQuizIdx];
            const isCorrect = idx === quiz.correct;
            const overlay = document.getElementById('feedback-overlay');
            const icon = document.getElementById('feedback-icon');
            const title = document.getElementById('feedback-title');
            const xpTxt = document.getElementById('feedback-xp');
            const btn = document.getElementById('feedback-btn');

            if (isCorrect) {
                icon.innerHTML = "✅";
                title.innerText = "BENAR!";
                xpTxt.innerText = "+20 XP";
                player.xp += 20;
                player.missionScore++;
            } else {
                icon.innerHTML = "❌";
                title.innerText = "SALAH!";
                xpTxt.innerText = "0 XP";
            }

            overlay.classList.remove('hidden');
            btn.onclick = () => {
                overlay.classList.add('hidden');
                player.currentQuizIdx++;
                if (player.currentQuizIdx < 5) {
                    updateQuiz();
                } else {
                    finishMission();
                }
            };
        }

        function finishMission() {
            const overlay = document.getElementById('feedback-overlay');
            const icon = document.getElementById('feedback-icon');
            const title = document.getElementById('feedback-title');
            const xpTxt = document.getElementById('feedback-xp');
            const btn = document.getElementById('feedback-btn');

            icon.innerHTML = "🏁";
            title.innerText = "MISI SELESAI!";
            xpTxt.innerText = `Skor Misi: ${player.missionScore}/5`;
            
            if (player.missionScore >= 3 && player.currentMission + 1 === player.unlockedMissions) {
                player.unlockedMissions++;
            }

            overlay.classList.remove('hidden');
            btn.innerText = "KEMBALI KE PETA";
            btn.onclick = () => {
                overlay.classList.add('hidden');
                btn.innerText = "LANJUT";
                backToMap();
            };
        }

        function backToMap() {
            renderMap();
            nextScreen('screen-map');
        }

    </script>
</body>
</html>
